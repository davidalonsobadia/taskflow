name: CI

# Required status checks for the protected `main` branch.
# Runs on every PR and on direct pushes to main.
on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

# Least privilege: CI only needs to read the code.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Postgres is used ONLY to validate that Alembic migrations apply cleanly.
    # The test suite itself runs against SQLite (see below).
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: taskflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Validate migrations apply (Postgres)
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/taskflow_test
        run: alembic upgrade head

      - name: Run tests (SQLite)
        env:
          TESTING: "1"
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: test-secret
        run: |
          if [ ! -d tests ]; then
            echo "No tests/ directory yet; nothing to run."
            exit 0
          fi
          set +e
          python -m pytest tests/ -v --tb=short
          code=$?
          set -e
          # Exit code 5 = "no tests collected". Acceptable while the suite is empty;
          # tests are added alongside features.
          if [ "$code" = "5" ]; then
            echo "No tests collected yet; treating as pass."
            exit 0
          fi
          exit $code

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (eslint)
        run: pnpm lint

      - name: Build
        run: pnpm build
