name: Agent - Plan

# Two ways to trigger the Planner:
#
#   1. Label trigger — add the `plan` label to a GitHub issue whose body contains a
#      feature idea. The Planner reads that issue and creates ordered sub-issues.
#
#   2. Manual dispatch — run via the Actions UI. Supply either a free-text idea
#      (inline) or a path to a repo file that lists multiple features
#      (defaults to docs/backlog.md).
#
# Note: push trigger is not supported by claude-code-action@v1. To process
# docs/backlog.md after pushing it, trigger this workflow manually via the UI.

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      idea:
        description: 'Free-text feature idea to decompose into issues'
        required: false
        type: string
      source_file:
        description: 'Path to a repo file with feature descriptions (default: docs/backlog.md)'
        required: false
        default: ''
        type: string

# Least privilege: read the codebase, write only issues.
# No `contents: write` — the Planner never pushes code.
permissions:
  contents: read
  issues: write
  id-token: write

concurrency:
  group: agent-plan-${{ github.event.issue.number || github.sha }}
  cancel-in-progress: false

jobs:
  plan:
    name: plan
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'plan') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so `git diff HEAD~1` works on push trigger

      - name: Notify Slack - started
        uses: ./.github/actions/slack-notify
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          text: |
            :brain: *Planner started* (trigger: `${{ github.event_name }}`)
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Run Planner agent
        id: plan
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are the autonomous Planner for this repository. Operate exactly as
            specified in `.claude/agents/planner.md` and follow `CLAUDE.md`.

            ## Context for this run

            Trigger event: `${{ github.event_name }}`
            Issue number:  "${{ github.event.issue.number }}"
            Inline idea:   "${{ inputs.idea }}"
            Source file:   "${{ inputs.source_file }}"

            ## Determine your input

            Use the trigger to decide where to read your feature input from:

            - **`issues`** — the `plan` label was added to issue #${{ github.event.issue.number }}.
              Run `gh issue view ${{ github.event.issue.number }}` and use that issue's body
              as the feature idea to decompose.

            - **`push`** — `docs/backlog.md` was just updated on `main`.
              Run `git diff HEAD~1 -- docs/backlog.md` to see what was added.
              Treat each new feature entry as an idea to decompose into issues.
              Before creating issues, run `gh issue list --limit 200 --state all` and
              skip any feature that is already tracked (fuzzy-match on title).

            - **`workflow_dispatch` with non-empty inline idea** — use the inline idea
              (the "Inline idea" field above) directly as your feature input.

            - **`workflow_dispatch` with empty inline idea** — read the source file
              (the "Source file" field above, or `docs/backlog.md` if blank).
              Process every feature entry in that file, skipping ones already tracked
              in GitHub Issues (same deduplication check as the push trigger).

            ## Non-negotiable rules for this run

            - Do NOT add the `auto` label to any issue you create — that is the human's
              trigger for the Implementer. Leave the issues clean and ordered.
            - Write everything in English.
            - If the input is too vague to decompose responsibly, post a comment on the
              triggering issue (for the `issues` trigger) or print clarifying questions
              and stop — do NOT create issues for ambiguous ideas.
          claude_args: |
            --model claude-opus-4-8
            --max-turns 40
            --permission-mode acceptEdits
            --allowedTools "Read,Glob,Grep,TodoWrite,Bash"
            --disallowedTools "Edit,Write,WebSearch,WebFetch"

      - name: Notify Slack - success
        if: success()
        uses: ./.github/actions/slack-notify
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          text: |
            :white_check_mark: *Planner finished* — check GitHub Issues for the new backlog items.
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Notify Slack - failure
        if: failure()
        uses: ./.github/actions/slack-notify
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          text: |
            :x: *Planner FAILED* — no issues were created.
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
